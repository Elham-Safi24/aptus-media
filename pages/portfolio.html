<!-- ══════════════════════════════════════
     LIGHTBOX
══════════════════════════════════════ -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <img id="lightbox-img" src="" alt="" onclick="event.stopPropagation()"/>
</div>

<!-- ══════════════════════════════════════
     CTA BANNER
══════════════════════════════════════ -->
<div class="divider"></div>
<section class="cta-banner">
  <h2 class="cta-banner-text fade-up">
    Ready to make your<br/><em>listing look this good?</em>
  </h2>
  <a href="contact.html" class="btn-primary fade-up">
    Book a Shoot
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </a>
</section>
<div class="divider"></div>

<div id="footer-placeholder"></div>

<script src="../js/components.js"></script>
<script>
  renderNav('portfolio');
  renderFooter('..');
  initScrollAnimations();

  function openLightbox(src, alt) {
    if (!src || src.includes('undefined')) return;
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox-img').alt = alt;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLightbox();
  });

  function filterPortfolio(category, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.portfolio-item').forEach(item => {
      const match = category === 'all' || item.dataset.category === category;
      item.style.opacity = match ? '1' : '0.15';
      item.style.pointerEvents = match ? 'auto' : 'none';
      item.style.transition = 'opacity 0.3s ease';
    });
  }
</script>
