<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLb()">
  <button class="lightbox-close" onclick="closeLb()">×</button>
  <img id="lb-img" src="" alt="" onclick="event.stopPropagation()"/>
</div>

<div class="divider"></div>
<section class="cta-wrap">
  <h2 class="cta-text fade-up">Ready to make your<br/><em>listing look this good?</em></h2>
  <a href="contact.html" class="btn-primary fade-up delay-1">Book a Shoot →</a>
</section>
<div class="divider"></div>

<div id="footer-ph"></div>
<script src="../js/main.js"></script>
<script>
renderNav('portfolio');renderFooter('..');initAnimations();
function lb(src,alt){document.getElementById('lb-img').src=src;document.getElementById('lb-img').alt=alt;document.getElementById('lightbox').classList.add('open');document.body.style.overflow='hidden';}
function closeLb(){document.getElementById('lightbox').classList.remove('open');document.body.style.overflow='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLb();});
function filter(cat,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.portfolio-item').forEach(el=>{
    const show=cat==='all'||el.dataset.cat===cat;
    el.style.opacity=show?'1':'0.12';
    el.style.pointerEvents=show?'auto':'none';
    el.style.transition='opacity .3s';
  });
}
</script>
